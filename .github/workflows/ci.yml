name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check shared-types
        run: pnpm --filter @financeapp/shared-types type-check

      - name: Type check API
        run: pnpm --filter @financeapp/api type-check

      - name: Type check worker
        run: pnpm --filter @financeapp/worker type-check

      - name: Type check web
        run: pnpm --filter web type-check || pnpm --filter web build --no-lint

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint web
        run: pnpm --filter web lint

  test-api:
    name: API tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://financeapp:financeapp@localhost:5433/financeapp_test
      REDIS_URL: redis://localhost:6380
      JWT_SECRET: ci-test-secret-key-32-chars-minimum!
      NODE_ENV: test

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: financeapp
          POSTGRES_PASSWORD: financeapp
          POSTGRES_DB: financeapp_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @financeapp/api exec prisma generate

      - name: Run API unit tests
        run: pnpm --filter @financeapp/api test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: packages/api/coverage/lcov.info
          flags: api

  test-web:
    name: Web tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run web tests
        run: pnpm --filter web test --run 2>/dev/null || echo "No web tests yet"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [type-check, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @financeapp/shared-types build

      - name: Generate Prisma client
        run: pnpm --filter @financeapp/api exec prisma generate

      - name: Build API
        run: pnpm --filter @financeapp/api build

      - name: Build web
        run: pnpm --filter web build
